<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Ethan's Cafe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #f8f9fa; }
        .verify-container { max-width: 400px; margin: 60px auto; background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); padding: 32px 28px; }
        .logo { display: block; margin: 0 auto 18px; height: 70px; border-radius: 50%; }
        .form-label { font-weight: 600; }
        .btn-maroon { background: #800000; color: #fff; border: none; }
        .btn-maroon:hover { background: #a64d4d; }
    </style>
</head>
<body>
    <div class="verify-container">
        <img src="resources/ethans logo.jpg" alt="Logo" class="logo">
        <h3 class="text-center mb-4">Verify OTP</h3>
        <form id="verifyOtpForm">
            <div class="mb-3">
                <label for="otpCode" class="form-label"><i class="fas fa-key me-2"></i>Enter OTP Code</label>
                <input type="text" class="form-control" id="otpCode" name="otpCode" placeholder="Enter the OTP" required maxlength="6">
            </div>
            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-maroon">Verify</button>
            </div>
            <div id="verifyAlert" class="alert d-none" role="alert"></div>
        </form>
        <div id="changePasswordSection" style="display:none;">
            <form id="changePasswordForm">
                <div class="mb-3">
                    <label for="newPassword" class="form-label"><i class="fas fa-lock me-2"></i>New Password</label>
                    <input type="password" class="form-control" id="newPassword" name="newPassword" placeholder="Enter new password" required minlength="6">
                </div>
                <div class="mb-3">
                    <label for="confirmPassword" class="form-label"><i class="fas fa-lock me-2"></i>Confirm Password</label>
                    <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required minlength="6">
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-maroon">Change Password</button>
                </div>
                <div id="changePasswordAlert" class="alert d-none" role="alert"></div>
            </form>
        </div>
        <div class="text-center mt-3">
            <a href="forgot-password.html" class="text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Back to Forgot Password</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="main.js"></script>
    <script src="verify-otp.js"></script>
</body>
</html>
