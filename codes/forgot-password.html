<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Ethan's Cafe</title>
    <link rel="icon" type="image/jpg" href="resources/ethans%20logo.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <style>
        :root {
            --maroon: #800000;
            --green: #2e8b57;
            --blue: #1e90ff;
            --black: #222222;
            --white: #ffffff;
            --light-maroon: #a64d4d;
            --dark-maroon: #660000;
            --light-green: #3cb371;
            --light-gray: #f8f9fa;
            --gold: #d4af37;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, rgba(34, 34, 34, 0.95) 0%, rgba(128, 0, 0, 0.85) 100%),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        .bg-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(212, 175, 55, 0.05);
            animation: float 15s infinite linear;
        }

        .bg-circle:nth-child(1) {
            width: 320px;
            height: 320px;
            top: -120px;
            right: -110px;
            animation-delay: 0s;
        }

        .bg-circle:nth-child(2) {
            width: 220px;
            height: 220px;
            bottom: 60px;
            left: -70px;
            animation-delay: 5s;
            background: rgba(46, 139, 87, 0.05);
        }

        .bg-circle:nth-child(3) {
            width: 170px;
            height: 170px;
            top: 38%;
            right: 22%;
            animation-delay: 10s;
            background: rgba(128, 0, 0, 0.05);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            33% {
                transform: translateY(-20px) rotate(120deg);
            }

            66% {
                transform: translateY(20px) rotate(240deg);
            }
        }

        .container-fluid {
            position: relative;
            z-index: 1;
            padding: 20px 0;
        }

        .main-content-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 48px;
            width: 100%;
            max-width: 1240px;
            margin: 0 auto;
            padding: 0 30px;
        }

        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            text-align: center;
        }

        .logo {
            height: 150px;
            width: auto;
            border-radius: 50%;
            border: 5px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(5deg);
            border-color: var(--gold);
        }

        .logo-text {
            color: var(--white);
            font-weight: 700;
            font-size: 2rem;
            letter-spacing: 1px;
            margin-top: 20px;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.4);
        }

        .logo-subtext {
            color: rgba(255, 255, 255, 0.88);
            margin-top: 6px;
            font-size: 1rem;
        }

        .forgot-section {
            flex: 1;
            max-width: 540px;
            width: 100%;
        }

        .forgot-card {
            border: none;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .card-header {
            background: linear-gradient(135deg, var(--maroon), var(--dark-maroon));
            border-bottom: none;
            padding: 22px 28px;
            position: relative;
            overflow: hidden;
        }

        .card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.12) 50%,
                    transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .forgot-title {
            color: #fff;
            font-weight: 700;
            font-size: 1.45rem;
            margin: 0;
            position: relative;
            z-index: 1;
        }

        .forgot-subtitle {
            color: rgba(255, 255, 255, 0.85);
            margin: 6px 0 0;
            font-size: 0.93rem;
            position: relative;
            z-index: 1;
        }

        .card-body {
            padding: 32px 34px;
        }

        .form-label {
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }

        .form-label i {
            color: var(--maroon);
        }

        .input-group {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            border: 2px solid #e1e5e9;
            transition: all 0.3s ease;
            overflow: hidden;
        }

        .input-group:focus-within {
            border-color: var(--maroon);
            background: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(128, 0, 0, 0.1);
        }

        .input-group-text {
            background: white;
            border: none;
            color: var(--maroon);
            padding: 13px 18px;
            font-size: 1.1rem;
        }

        .form-control {
            border: none;
            padding: 13px 14px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control:focus {
            background: white;
            box-shadow: none;
            border: none;
        }

        .btn-maroon {
            background: linear-gradient(135deg, var(--maroon), var(--dark-maroon));
            border: none;
            color: white;
            padding: 13px 26px;
            font-size: 1.03rem;
            font-weight: 600;
            border-radius: 12px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(128, 0, 0, 0.3);
        }

        .btn-maroon:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(128, 0, 0, 0.4);
            color: white;
        }

        .btn-maroon::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg,
                    transparent 30%,
                    rgba(255, 255, 255, 0.2) 50%,
                    transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .btn-maroon:hover::after {
            transform: translateX(100%);
        }

        .alert {
            border: none;
            border-radius: 12px;
            padding: 14px 16px;
            margin-top: 14px;
        }

        .alert-danger {
            background: rgba(220, 53, 69, 0.12);
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.12);
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .back-link {
            margin-top: 16px;
            text-align: center;
        }

        .back-link a {
            color: var(--maroon);
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-weight: 500;
        }

        .back-link a:hover {
            color: var(--dark-maroon);
            transform: translateY(-2px);
        }

        @media (max-width: 992px) {
            body {
                height: auto;
                padding: 24px 0;
            }

            .main-content-row {
                flex-direction: column;
                gap: 24px;
                padding: 0 16px;
            }

            .logo {
                height: 110px;
            }

            .logo-text {
                font-size: 1.7rem;
                margin-top: 12px;
            }

            .forgot-section {
                max-width: 620px;
            }
        }

        @media (max-width: 576px) {
            .card-header {
                padding: 18px 20px;
            }

            .forgot-title {
                font-size: 1.25rem;
            }

            .card-body {
                padding: 22px 18px;
            }

            .input-group-text {
                padding: 11px 14px;
                font-size: 1rem;
            }

            .form-control {
                padding: 11px 12px;
                font-size: 0.95rem;
            }

            .btn-maroon {
                padding: 11px 20px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-elements">
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
        <div class="bg-circle"></div>
    </div>

    <div class="container-fluid">
        <div class="main-content-row">
            <div class="logo-section animate__animated animate__fadeInLeft">
                <img src="resources/ethans logo.jpg" alt="Logo" class="logo">
                <h1 class="logo-text">Restaurant POS</h1>
                <p class="logo-subtext">Secure Password Recovery</p>
            </div>

            <div class="forgot-section animate__animated animate__fadeInRight">
                <div class="card forgot-card">
                    <div class="card-header">
                        <h3 class="forgot-title"><i class="fas fa-key me-2"></i>Forgot Password</h3>
                        <p class="forgot-subtitle">Enter your registered email to receive your OTP</p>
                    </div>

                    <div class="card-body">
                        <form id="forgotPasswordForm">
                            <div class="mb-3">
                                <label for="forgotEmail" class="form-label"><i class="fas fa-envelope"></i>Email address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-at"></i></span>
                                    <input type="email" class="form-control" id="forgotEmail" name="forgotEmail" placeholder="Enter your email" required>
                                </div>
                            </div>

                            <div class="d-grid mb-2">
                                <button type="submit" class="btn btn-maroon btn-lg w-100"><i class="fas fa-paper-plane me-2"></i>Send OTP</button>
                            </div>

                            <div id="forgotAlert" class="alert d-none" role="alert"></div>
                        </form>

                        <div class="back-link">
                            <a href="index.html"><i class="fas fa-arrow-left me-1"></i>Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script src="main.js"></script>
    <script src="forgot-password.js"></script>
</body>

</html>
